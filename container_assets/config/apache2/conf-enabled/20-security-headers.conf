# HTTP security response headers.
# These apply to every response served by this Apache instance.
#
# CSP is intentionally omitted — REDCap uses inline scripts and eval, making a
# strict policy impractical without per-deployment tuning. Add one via the
# custom vhost include (/config/apache/custom.virtualhost) if needed.

<IfModule mod_headers.c>
    # Prevent framing by other origins (clickjacking protection)
    Header always set X-Frame-Options "SAMEORIGIN"

    # Prevent MIME-type sniffing
    Header always set X-Content-Type-Options "nosniff"

    # Limit referer information sent on cross-origin navigations
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Restrict access to browser features not used by REDCap
    Header always set Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()"

    # Remove headers that leak server technology details
    Header always unset X-Powered-By
    Header always unset Server
</IfModule>
