services:
  redcap:
    image: dzdde/redcap-docker
    environment:
      # --- Beta: Auto-install/upgrade ---
      # The container downloads this version on first boot if files are not yet present.
      REDCAP_VERSION: "14.9.5"
      REDCAP_COMMUNITY_USER: your_community_username       # community.projectredcap.org
      REDCAP_COMMUNITY_PASSWORD: your_community_password  # community.projectredcap.org
      # Set to "true" to also auto-upgrade when REDCAP_VERSION is bumped.
      # Default "false": logs a warning and keeps the existing version until you run redcap-upgrade.
      REDCAP_AUTO_UPGRADE: "false"

      # --- Database ---
      DB_HOSTNAME: db
      DB_NAME: redcap
      DB_USERNAME: redcap
      DB_PASSWORD: redcap123
      # Use a long random hex string. Never reuse this example value.
      DB_SALT: changeme_use_a_long_random_hex_string_here

      # --- REDCap application config ---
      RCCONF_redcap_base_url: "http://localhost"
      RCCONF_institution: "Your Institution"
      RCCONF_homepage_contact: "REDCap Admin"
      RCCONF_homepage_contact_email: "redcap@example.com"
    volumes:
      - ./data/redcap:/var/www/html          # REDCap files persist here after download
      - ./data/backups:/opt/redcap-docker/backups  # pre-upgrade DB backups land here
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:lts
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: redcap
      MYSQL_USER: redcap
      MYSQL_PASSWORD: redcap123
      MYSQL_ROOT_PASSWORD: redcaproot123
    volumes:
      - ./data/db:/var/lib/mysql
    healthcheck:
      test: "/usr/bin/mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e 'SHOW TABLES;'"
      interval: 5s
      timeout: 3s
      retries: 5
    command:
      - --max_allowed_packet=128M
      - --bind-address=0.0.0.0
      - --innodb_file_per_table=1
    logging:
      options:
        max-size: "10m"
        max-file: "3"
