services:
  redcap:
    image: dzdde/redcap-docker
    environment:
      # --- Database ---
      DB_HOSTNAME: db
      DB_NAME: redcap
      DB_USERNAME: redcap
      DB_PASSWORD: redcap123
      DB_SALT: d369a86842347f7e3e40a3ec64b9f9d950bdfde05beba3a61da69bb1fb28dcea9152fbf723889181a9bd9a97f34b90faf17a

      # --- Installation ---
      REDCAP_INSTALL_ENABLE: "true"

      # --- REDCap application config ---
      RCCONF_redcap_base_url: "http://localhost"
      RCCONF_institution: "Weyland-Yutani Corporation"
      RCCONF_homepage_contact: "Karl Bishop"
      RCCONF_homepage_contact_email: "k.bishop@wy-corp.earth"
      RCCONF_project_contact_name: "Colette Ferro"
      RCCONF_project_contact_email: "c.ferro@wy-corp.earth"
      RCCONF_from_email: "redcap-system@wy-corp.earth"

      # --- Email (msmtp) ---
      # Replace with your actual SMTP provider settings.
      MSMTP_from: "redcap-system@wy-corp.earth"
      MSMTP_host: "mail.your-server.de"
      MSMTP_port: 587
      MSMTP_auth: "on"
      MSMTP_user: "redcap-system@wy-corp.earth"
      MSMTP_password: "mytotalsecretpassword"
      MSMTP_tls: "on"
      MSMTP_tls_starttls: "on"
      MSMTP_syslog: "on"
    volumes:
      - ./data/redcap:/var/www/html
      - ./sql_scripts:/opt/redcap-docker/sql_scripts_run_once
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:lts
    restart: "no"
    environment:
      MYSQL_DATABASE: redcap
      MYSQL_USER: redcap
      MYSQL_PASSWORD: redcap123
      MYSQL_ROOT_PASSWORD: redcaproot123
    volumes:
      - ./data/db:/var/lib/mysql
    healthcheck:
      test: "/usr/bin/mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e 'SHOW TABLES;'"
      interval: 5s
      timeout: 3s
      retries: 5
    command:
      - --max_allowed_packet=128M
      - --bind-address=0.0.0.0
      - --innodb_file_per_table=1
    logging:
      options:
        max-size: "10m"
        max-file: "3"
