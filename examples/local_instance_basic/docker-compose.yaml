services:
  redcap:
    image: dzdde/redcap-docker
    environment:
      # --- Database ---
      DB_HOSTNAME: db
      DB_NAME: redcap
      DB_USERNAME: redcap
      DB_PASSWORD: redcap123
      # Use a long random hex string. Never reuse this example value.
      DB_SALT: d369a86842347f7e3e40a3ec64b9f9d950bdfde05beba3a61da69bb1fb28dcea9152fbf723889181a9bd9a97f34b90faf17a

      # --- Installation ---
      REDCAP_INSTALL_ENABLE: "true"

      # --- REDCap application config (sets rows in the redcap_config table) ---
      APPLY_RCCONF_VARIABLES: "true"
      RCCONF_redcap_base_url: "http://localhost"
      RCCONF_institution: "Weyland-Yutani Corporation"
      RCCONF_homepage_contact: "Karl Bishop"
      RCCONF_homepage_contact_email: "k.bishop@wy-corp.earth"
      RCCONF_project_contact_name: "Colette Ferro"
      RCCONF_project_contact_email: "c.ferro@wy-corp.earth"
    volumes:
      # Mount your REDCap source here. index.php must be at the root of this directory.
      - ./data/redcap:/var/www/html
      # Optional: .sql files placed here run once on next boot (useful for one-off migrations).
      - ./sql_scripts:/opt/redcap-docker/sql_scripts_run_once
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - NET_BIND_SERVICE  # remove if mapping to a non-privileged host port (e.g. "8080:80")
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:lts
    restart: "no"
    environment:
      MYSQL_DATABASE: redcap
      MYSQL_USER: redcap
      MYSQL_PASSWORD: redcap123
      MYSQL_ROOT_PASSWORD: redcaproot123
    volumes:
      - ./data/db:/var/lib/mysql
    healthcheck:
      test: "/usr/bin/mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e 'SHOW TABLES;'"
      interval: 5s
      timeout: 3s
      retries: 5
    command:
      - --max_allowed_packet=128M
      - --bind-address=0.0.0.0
      - --innodb_file_per_table=1
    logging:
      options:
        max-size: "10m"
        max-file: "3"
