services:
  redcap:
    image: dzdde/redcap-docker
    environment:
      # --- Database ---
      DB_HOSTNAME: db
      DB_NAME: redcap
      DB_USERNAME: redcap
      DB_PASSWORD: redcap123
      DB_SALT: d369a86842347f7e3e40a3ec64b9f9d950bdfde05beba3a61da69bb1fb28dcea9152fbf723889181a9bd9a97f34b90faf17a

      # --- Installation ---
      REDCAP_INSTALL_ENABLE: "true"

      # --- REDCap application config ---
      APPLY_RCCONF_VARIABLES: "true"
      RCCONF_redcap_base_url: "http://localhost"
      RCCONF_institution: "Weyland-Yutani Corporation"
      RCCONF_homepage_contact: "Karl Bishop"
      RCCONF_homepage_contact_email: "k.bishop@wy-corp.earth"
      RCCONF_project_contact_name: "Colette Ferro"
      RCCONF_project_contact_email: "c.ferro@wy-corp.earth"
      # Use table-based (local) authentication so provisioned users can log in.
      RCCONF_auth_meth_global: "table"

      # --- User provisioning ---
      ENABLE_USER_PROV: "true"
      # Overwrite existing users on every boot (useful for keeping users in sync).
      USER_PROV_OVERWRITE_EXISTING: "true"
      # Suspend the default site admin — provisioned users will be the only admins.
      REDCAP_SUSPEND_SITE_ADMIN: "true"

      # Two additional users defined inline as JSON.
      # For larger user lists, use users.yaml (mounted below).
      USER_PROV_1: '{"username": "user1", "user_firstname": "Alice", "user_lastname": "One", "user_email": "alice@example.com"}'
      USER_PROV_2: '{"username": "user2", "user_firstname": "Bob", "user_lastname": "Two", "user_email": "bob@example.com"}'
    volumes:
      # User list from a YAML file — see users.yaml for the full schema.
      - ./users.yaml:/opt/redcap-docker/users/users.yaml
      - ./data/redcap:/var/www/html
      - ./sql_scripts:/opt/redcap-docker/sql_scripts_run_once
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:lts
    restart: "no"
    environment:
      MYSQL_DATABASE: redcap
      MYSQL_USER: redcap
      MYSQL_PASSWORD: redcap123
      MYSQL_ROOT_PASSWORD: redcaproot123
    volumes:
      - ./data/db:/var/lib/mysql
    healthcheck:
      test: "/usr/bin/mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e 'SHOW TABLES;'"
      interval: 5s
      timeout: 3s
      retries: 5
    command:
      - --max_allowed_packet=128M
      - --bind-address=0.0.0.0
      - --innodb_file_per_table=1
    logging:
      options:
        max-size: "10m"
        max-file: "3"
